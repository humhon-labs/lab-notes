<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>글 · Humhon Labs Notes</title>
  <link rel="stylesheet" href="assets/style.css" />
  <script>
    (function () {
      try { document.documentElement.setAttribute('data-theme', localStorage.getItem('labnotes-theme') || 'dark'); }
      catch (e) { document.documentElement.setAttribute('data-theme', 'dark'); }
    })();
  </script>
</head>
<body>
  <a class="skip-link" href="#content">본문으로 건너뛰기</a>
  <header class="site-header">
    <a class="brand" href="index.html">
      <span class="brand-mark">🧪</span>
      <span class="brand-text"><strong>Humhon Labs Notes</strong><small>기술 지식과 실무 경험을 기록하고 공유합니다</small></span>
    </a>
    <div class="header-actions">
      <a class="text-btn" href="index.html">← 목록</a>
      <button id="theme-toggle" class="icon-btn" type="button" aria-label="테마 전환">🌙</button>
    </div>
    <div id="read-progress" class="read-progress" aria-hidden="true"></div>
  </header>

  <main id="content" class="post-layout" tabindex="-1">
    <aside id="toc-wrap" class="toc" style="display:none" aria-label="목차">
      <details id="toc-details" class="toc-details" open>
        <summary class="section-label">목차</summary>
        <div id="toc" class="toc-list"></div>
      </details>
    </aside>

    <article class="post">
      <header id="post-meta" class="post-meta"></header>
      <div id="post-body" class="post-body markdown"></div>

      <section id="post-footer" class="post-footer" style="display:none">
        <div class="section-label">관련 글</div>
        <ul id="related" class="related-grid"></ul>
        <p id="no-related" class="no-related" style="display:none">같은 태그의 다른 글이 아직 없습니다.</p>
        <div id="prev-next" class="prev-next"></div>
      </section>
    </article>
  </main>

  <footer class="site-footer">© Humhon Labs Notes</footer>

  <script src="data/posts.js"></script>
  <script src="assets/marked.min.js"></script>
  <script src="assets/post.js"></script>
  <script src="assets/theme.js"></script>
</body>
</html>
